<!DOCTYPE html>
<head>
    <script type="text/javascript">
        function fact(){
            var str = parseInt(document.getElementById("num").value);
            var f = 1; 

            for(let i = str; i>0;i--){
                f = f*i;
            }
            document.getElementById("result").innerHTML = "The factorial of "+ str + " is " + f;
        }
    </script>
</head>
<body>
    <p> Enter the number: 
        <input id ="num" type="text" placeholder="Enter Number">
        <button onclick="setInterval(function(){
            fact();
        },1000)">Calculate</button>
    </p>
    <p id="result"></p>
</body>
