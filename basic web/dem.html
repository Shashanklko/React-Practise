
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var str = parseInt(prompt("Enter Number"));
        var f = 1;
        for(let i = str; i>0;i--){
            f = f * i;
        }
        document.write("The factorial of "+ str +" is "+ f);
    </script>
</head>
